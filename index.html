<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nox AI – Conversational Website Builder | thenoxdigital.com</title>

    <!-- Favicon + Open Graph -->
    <link rel="icon" type="image/png" href="logo.png">
    <meta property="og:title" content="Nox AI – Conversational Website Builder">
    <meta property="og:description" content="Build your website in minutes with Nox AI – a simple AI website generator with clean Tailwind code.">
    <meta property="og:type" content="website">
    <!-- Replace this URL with your deployed domain -->
    <meta property="og:image" content="https://your-domain.com/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6RP5M4N271"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      * { font-family: 'Poppins', sans-serif; }

      .gradient-text {
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .gradient-btn {
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
        transition: all 0.3s ease;
      }

      .gradient-btn:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 18px 50px rgba(15, 82, 186, 0.35);
      }

      .gradient-btn:active {
        transform: translateY(0) scale(0.98);
        box-shadow: 0 8px 30px rgba(15, 82, 186, 0.25);
      }

      .btn-soft {
        transition: all 0.25s ease;
      }

      .btn-soft:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(15, 82, 186, 0.12);
      }

      .service-card {
        transition: all 0.3s ease;
      }

      .service-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 60px rgba(11, 31, 58, 0.12);
      }

      .service-card:hover .service-icon {
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
      }

      .service-card:hover .service-icon svg {
        stroke: #ffffff;
        color: #ffffff;
      }

      .testimonial-card {
        transition: all 0.3s ease;
      }

      .testimonial-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 50px rgba(11, 31, 58, 0.12);
      }

      .nav-link {
        position: relative;
        transition: color 0.2s ease;
      }

      .nav-link::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
        transition: width 0.3s ease;
      }

      .nav-link:hover::after {
        width: 100%;
      }

      .input-field {
        transition: all 0.3s ease;
      }

      .input-field:focus {
        border-color: #0F52BA;
        box-shadow: 0 0 0 3px rgba(15, 82, 186, 0.1);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }

      .float-animation {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .fade-in-up { opacity: 0; }
      .fade-in-up.animate-in { animation: fadeInUp 0.9s ease forwards; }

      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-400 { animation-delay: 0.4s; }
      .delay-500 { animation-delay: 0.5s; }
      .delay-600 { animation-delay: 0.6s; }

      body.intro-lock { overflow: hidden; }

      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .intro-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .intro-logo-wrapper {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(1.6);
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        opacity: 0;
      }

      .intro-logo-img {
        width: 80px;
        height: 80px;
        object-fit: contain;
      }

      .intro-name {
        font-size: 1.8rem;
        font-weight: 600;
        color: #0B1F3A;
        letter-spacing: 0.05em;
        opacity: 0;
      }

      @keyframes introLogoPop {
        from { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
        to   { transform: translate(-50%, -50%) scale(1.6); opacity: 1; }
      }

      @keyframes introTextFade {
        from { opacity: 0; transform: translateX(10px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      @keyframes introToHeader {
        from {
          transform: translate(-50%, -50%) scale(1.6);
        }
        to {
          transform: translate(calc(-50% + 1.5rem - 50vw),
                               calc(-50% + 1.25rem - 50vh)) scale(1);
        }
      }

      body { box-sizing: border-box; }
    </style>
  </head>

  <body class="h-full bg-white text-gray-800 overflow-auto intro-lock">
    <!-- INTRO OVERLAY -->
    <div id="introOverlay" class="intro-overlay">
      <div id="introLogoWrapper" class="intro-logo-wrapper">
        <img src="logo.png" alt="Nox AI logo" class="intro-logo-img">
        <span id="introName" class="intro-name">Nox AI</span>
      </div>
    </div>

    <div class="w-full h-full">

      <!-- NAVBAR -->
      <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100">
        <div class="w-full px-4 sm:px-6 lg:px-10 xl:px-16">
          <div class="flex items-center justify-between h-20">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 relative">
                <img src="logo.png"
                     alt="Nox AI logo"
                     class="w-10 h-10 object-contain">
              </div>
              <div class="leading-tight">
                <span class="text-xl font-semibold text-[#0B1F3A] tracking-tight">Nox AI</span>
                <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400">thenoxdigital.com</p>
              </div>
            </div>

            <div class="hidden md:flex items-center gap-8">
              <a href="index.html" class="nav-link text-sm font-medium text-gray-600 hover:text-[#0B1F3A]">Home</a>
              <a href="generate.html" class="nav-link text-sm font-medium text-gray-600 hover:text-[#0B1F3A]">Generate</a>
              <a href="pricing.html" class="nav-link text-sm font-medium text-gray-600 hover:text-[#0B1F3A]">Pricing</a>
              <a href="about.html" class="nav-link text-sm font-medium text-gray-600 hover:text-[#0B1F3A]">About</a>

              <a href="signup.html"
                 id="navSignupBtn"
                 class="gradient-btn px-6 py-2.5 text-sm font-medium text-white rounded-full shadow-sm inline-flex items-center gap-2">
                Sign up
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                </svg>
              </a>
            </div>

            <button id="mobileMenuBtn" class="md:hidden p-2 text-gray-600">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
          </div>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-gray-100">
          <div class="px-4 sm:px-6 py-4 space-y-3">
            <a href="index.html" class="block text-sm font-medium text-gray-600 hover:text-[#0B1F3A] py-2">Home</a>
            <a href="generate.html" class="block text-sm font-medium text-gray-600 hover:text-[#0B1F3A] py-2">Generate</a>
            <a href="pricing.html" class="block text-sm font-medium text-gray-600 hover:text-[#0B1F3A] py-2">Pricing</a>
            <a href="about.html" class="block text-sm font-medium text-gray-600 hover:text-[#0B1F3A] py-2">About</a>
            <a href="signup.html"
               class="gradient-btn block text-center px-6 py-2.5 text-sm font-medium text-white rounded-full mt-4">
              Sign up
            </a>
          </div>
        </div>
      </nav>

      <!-- HERO -->
      <!-- (rest of your HTML is unchanged) -->

      <!-- DEMO SECTION -->
      <!-- ... all your existing sections exactly as before ... -->

      <!-- FOOTER -->
      <footer class="bg-[#0B1F3A] text-white py-16">
        <!-- existing footer content -->
      </footer>

    </div>

    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
    <script>
      const SUPABASE_URL = "https://ooyouwalbpvqdjvvtsjj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_T_dsAws2gsGobdqYW8FlNw_HtCveQu4";

      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function refreshAuthUI() {
        try {
          const { data } = await supabaseClient.auth.getUser();
          const user = data.user;

          const navSignupBtn = document.getElementById('navSignupBtn');

          if (user) {
            if (navSignupBtn) {
              navSignupBtn.textContent = "Dashboard";
              navSignupBtn.href = "dashboard.html";
            }
          } else {
            if (navSignupBtn) {
              navSignupBtn.textContent = "Sign up";
              navSignupBtn.href = "signup.html";
            }
          }
        } catch (e) {
          console.error("Error checking auth state", e);
        }
      }

      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const mobileMenu = document.getElementById('mobileMenu');

      if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
        });
      }

      const nav = document.querySelector('nav');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
          nav.classList.add('shadow-md');
        } else {
          nav.classList.remove('shadow-md');
        }
      });

      window.addEventListener('load', () => {
        const overlay = document.getElementById('introOverlay');
        const wrapper = document.getElementById('introLogoWrapper');
        const nameEl  = document.getElementById('introName');

        wrapper.style.animation = 'introLogoPop 0.7s ease forwards';

        setTimeout(() => {
          nameEl.style.animation = 'introTextFade 0.5s ease forwards';
        }, 800);

        setTimeout(() => {
          wrapper.style.animation = 'introToHeader 0.7s ease forwards';
        }, 1500);

        setTimeout(() => {
          overlay.classList.add('hidden');
          document.body.classList.remove('intro-lock');

          document.querySelectorAll('.fade-in-up').forEach(el => {
            el.classList.add('animate-in');
          });

          refreshAuthUI();
        }, 1700);
      });
    </script>
  </body>
</html>
