    <style>
      * { font-family: 'Poppins', sans-serif; }

      .gradient-text {
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .gradient-btn {
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
        transition: all 0.3s ease;
      }

      .gradient-btn:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 18px 50px rgba(15, 82, 186, 0.35);
      }

      .gradient-btn:active {
        transform: translateY(0) scale(0.98);
        box-shadow: 0 8px 30px rgba(15, 82, 186, 0.25);
      }

      .btn-soft {
        transition: all 0.25s ease;
      }

      .btn-soft:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(15, 82, 186, 0.12);
      }

      .service-card {
        transition: all 0.3s ease;
      }

      .service-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 60px rgba(11, 31, 58, 0.12);
      }

      .service-card:hover .service-icon {
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
      }

      .service-card:hover .service-icon svg {
        stroke: #ffffff;
        color: #ffffff;
      }

      .testimonial-card {
        transition: all 0.3s ease;
      }

      .testimonial-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 50px rgba(11, 31, 58, 0.12);
      }

      .nav-link {
        position: relative;
        transition: color 0.2s ease;
      }

      .nav-link::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(135deg, #0F52BA 0%, #14B8A6 100%);
        transition: width 0.3s ease;
      }

      .nav-link:hover::after {
        width: 100%;
      }

      .input-field {
        transition: all 0.3s ease;
      }

      .input-field:focus {
        border-color: #0F52BA;
        box-shadow: 0 0 0 3px rgba(15, 82, 186, 0.1);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }

      .float-animation {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .fade-in-up { opacity: 0; }
      .fade-in-up.animate-in { animation: fadeInUp 0.9s ease forwards; }

      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-400 { animation-delay: 0.4s; }
      .delay-500 { animation-delay: 0.5s; }
      .delay-600 { animation-delay: 0.6s; }

      body.intro-lock { overflow: hidden; }

      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .intro-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .intro-logo-wrapper {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(1.6);
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        opacity: 0;
      }

      .intro-logo-img {
        width: 80px;
        height: 80px;
        object-fit: contain;
      }

      .intro-name {
        font-size: 1.8rem;
        font-weight: 600;
        color: #0B1F3A;
        letter-spacing: 0.05em;
        opacity: 0;
      }

      @keyframes introLogoPop {
        from { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
        to   { transform: translate(-50%, -50%) scale(1.6); opacity: 1; }
      }

      @keyframes introTextFade {
        from { opacity: 0; transform: translateX(10px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      @keyframes introToHeader {
        from {
          transform: translate(-50%, -50%) scale(1.6);
        }
        to {
          transform: translate(calc(-50% + 1.5rem - 50vw),
                               calc(-50% + 1.25rem - 50vh)) scale(1);
        }
      }

      body { box-sizing: border-box; }
    </style>
  </head>
